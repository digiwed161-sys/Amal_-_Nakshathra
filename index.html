document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

arted) { vid.pause(); try { vid.currentTime = 0; } catch(e){} } }).catch(function(){});\n    else setTimeout(function(){ if (!started) vid.pause(); }, 60);\n  }\n  vid.addEventListener('loadeddata', freezeFirstFrame);\n  if (vid.readyState >= 2) freezeFirstFrame();\n\n  // Tap once: play the video through, then go straight to the invitation.\n  function play(){\n    if (started || revealed) return;\n    started = true;\n    vid.loop = false;\n    vid.muted = false;\n    try { vid.currentTime = 0; } catch(e){}\n    var p = vid.play();\n    if (p && p.catch) p.catch(function(){ vid.muted = true; var q = vid.play(); if (q && q.catch) q.catch(function(){ reveal(); }); });\n  }\n\n  function reveal(){\n    if (revealed) return;\n    revealed = true;\n    // Tell the invitation component to \"open\" so the hero names animate in.\n    window.__naRevealed = true;\n    try { if (window.__naReveal) window.__naReveal(); } catch(e){}\n    try { if (document.exitFullscreen) document.exitFullscreen(); else if (document.webkitExitFullscreen) document.webkitExitFullscreen(); } catch(e){}\n    try { vid.pause(); } catch(e){}\n    land.style.transition = 'opacity .8s ease';\n    land.style.opacity = '0';\n    setTimeout(function(){ land.style.display = 'none'; }, 850);\n    document.body.style.overflow = '';\n    var root = document.querySelector('[data-screen-label=\"Day Night Invitation\"]') || document;\n    var heroEls = root.querySelectorAll('[data-hero]');\n    heroEls.forEach(function(el, i){\n      el.style.transition = 'opacity 1s ease ' + (200 + i * 150) + 'ms, transform 1s cubic-bezier(.22,1,.36,1) ' + (200 + i * 150) + 'ms, color 1.2s ease';\n      el.style.opacity = '1';\n      var t = el.style.transform || '';\n      el.style.transform = t.indexOf('-50%') !== -1 ? 'translate(-50%, 0)' : 'translateY(0)';\n    });\n    try { window.scrollTo(0, 0); } catch(e){}\n    // Keep scrolling unlocked even if the invitation component mounts late\n    // (its componentDidMount otherwise re-locks body overflow).\n    var t0 = Date.now();\n    var guard = setInterval(function(){ document.body.style.overflow = ''; if (Date.now() - t0 > 3000) clearInterval(guard); }, 250);\n  }\n\n  land.addEventListener('click', play);\n  land.addEventListener('touchend', function(e){ e.preventDefault(); play(); }, { passive: false });\n\n  // After the single play-through, go straight to the invitation.\n  vid.addEventListener('ended', reveal);\n})();\n<\/script>\n\n<!-- ============ WISHES & BLESSINGS — backend (Firebase RTDB) ============ -->\n<div id=\"na-toast\"><\/div>\n<script src=\"https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js\"><\/script>\n<script src=\"https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js\"><\/script>\n<script>\n(function(){\n  var FIREBASE_CONFIG = {\n    apiKey:            \"AIzaSyB41fvxvl1KeHOro6WKJ72o22izuCpJ-b4\",\n    authDomain:        \"yaseen-jumana-wedding.firebaseapp.com\",\n    databaseURL:       \"https://yaseen-jumana-wedding-default-rtdb.firebaseio.com\",\n    projectId:         \"yaseen-jumana-wedding\",\n    storageBucket:     \"yaseen-jumana-wedding.firebasestorage.app\",\n    messagingSenderId: \"355557621111\",\n    appId:             \"1:355557621111:web:d0b78c34bfe5a53b69f572\"\n  };\n  var WISHES_PATH = \"amal-nakshathra/wishes\";\n  var ADMIN_PIN   = \"2026NA\";\n  var COUPLE      = \"Nakshathra & Amal\";\n\n  var db = null, adminMode = false, _all = [], _shown = 6, PAGE = 6, recentTs = 0;\n  try { firebase.initializeApp(FIREBASE_CONFIG); db = firebase.database(); } catch (e) { console.warn('Firebase init failed', e); }\n\n  function esc(s){ return String(s == null ? '' : s).replace(/[<>\"'&]/g, function(c){ return ({'<':'&lt;','>':'&gt;','\"':'&quot;',\"'\":'&#39;','&':'&amp;'})[c]; }); }\n  function toast(msg){ var t = document.getElementById('na-toast'); if(!t) return; t.textContent = msg; t.classList.add('show'); clearTimeout(t._h); t._h = setTimeout(function(){ t.classList.remove('show'); }, 2400); }\n\n  function card(w){\n    var likes = w.likes || 0;\n    var liked = localStorage.getItem('na_liked_' + w.key) ? ' liked' : '';\n    var h = '<div class=\"na-wish\" data-key=\"' + w.key + '\">'\n      + '<div class=\"na-wn\">' + esc(w.name) + '<\/div>'\n      + '<div class=\"na-wm\">“' + esc(w.msg) + '”<\/div>'\n      + '<div class=\"na-wish-foot\">'\n      +   '<button class=\"na-like' + liked + '\" onclick=\"naLike(\\'' + w.key + '\\',this)\" aria-label=\"like\">♥ <span>' + likes + '<\/span><\/button>'\n      +   '<span class=\"na-wd\">' + esc(w.time || '') + '<\/span>'\n      + '<\/div>';\n    if (w.reply && w.reply.msg) {\n      h += '<div class=\"na-reply\"><div class=\"na-reply-who\">↳ ' + esc(COUPLE) + '<\/div><div class=\"na-reply-msg\">' + esc(w.reply.msg) + '<\/div><\/div>';\n    }\n    if (adminMode) {\n      var has = w.reply && w.reply.msg;\n      h += '<div class=\"na-w-admin\"><button class=\"na-reply-btn\" onclick=\"naReplyEditor(\\'' + w.key + '\\')\">' + (has ? 'EDIT REPLY' : 'REPLY') + '<\/button>'\n        + (has ? '<button class=\"na-reply-btn rm\" onclick=\"naRemoveReply(\\'' + w.key + '\\')\">REMOVE<\/button>' : '') + '<\/div>';\n    }\n    return h + '<\/div>';\n  }\n\n  function render(){\n    var grid = document.getElementById('naWgrid'); if(!grid) return;\n    var cnt = _all.length;\n    var cEl = document.getElementById('naWishCount');\n    if (cEl) cEl.textContent = cnt ? (cnt + (cnt === 1 ? ' wish & blessing' : ' wishes & blessings')) : '';\n    if (!cnt) { grid.innerHTML = '<div class=\"na-w-empty\">No wishes yet — be the first to send your blessings.<\/div>'; return; }\n    var html = _all.slice(0, _shown).map(card).join('');\n    if (cnt > _shown) html += '<button type=\"button\" class=\"na-loadmore\" onclick=\"naMore()\">LOAD MORE<\/button>';\n    grid.innerHTML = html;\n  }\n\n  window.naMore = function(){ _shown += PAGE; render(); };\n\n  window.naLike = function(key, btn){\n    if (localStorage.getItem('na_liked_' + key)) return;\n    localStorage.setItem('na_liked_' + key, '1');\n    if (btn) { btn.classList.add('liked'); var s = btn.querySelector('span'); if (s) s.textContent = (parseInt(s.textContent || '0', 10) + 1); }\n    if (db) db.ref(WISHES_PATH + '/' + key + '/likes').transaction(function(n){ return (n || 0) + 1; });\n  };\n\n  window.naReplyEditor = function(key){\n    var cardEl = document.querySelector('.na-wish[data-key=\"' + key + '\"]');\n    if (!cardEl || cardEl.querySelector('.na-reply-ed')) return;\n    var w = _all.filter(function(x){ return x.key === key; })[0] || {};\n    var ed = document.createElement('div'); ed.className = 'na-reply-ed';\n    var ta = document.createElement('textarea'); ta.placeholder = 'Reply to ' + (w.name || 'this wish') + '…';\n    if (w.reply && w.reply.msg) ta.value = w.reply.msg;\n    var save = document.createElement('button'); save.type = 'button'; save.className = 'na-reply-btn'; save.textContent = 'SAVE REPLY';\n    save.onclick = function(){\n      var txt = ta.value.trim();\n      if (!txt) { toast('Reply is empty'); return; }\n      if (!db) { toast('No connection'); return; }\n      save.disabled = true;\n      db.ref(WISHES_PATH + '/' + key + '/reply').set({ msg: txt, ts: Date.now() }, function(err){\n        save.disabled = false;\n        if (err) { toast('Could not save — try again'); return; }\n        toast('Reply sent ♥'); ed.remove();\n      });\n    };\n    ed.appendChild(ta); ed.appendChild(save); cardEl.appendChild(ed); ta.focus();\n  };\n\n  window.naRemoveReply = function(key){\n    if (!db) return;\n    db.ref(WISHES_PATH + '/' + key + '/reply').remove(function(err){ toast(err ? 'Could not remove' : 'Reply removed'); });\n  };\n\n  function checkOwnReplies(){\n    if (document.hidden) return;\n    var mine = []; try { mine = JSON.parse(localStorage.getItem('na_myWishKeys') || '[]'); } catch (e) {}\n    if (!mine.length) return;\n    _all.forEach(function(w){\n      if (mine.indexOf(w.key) >
